name: arvenland
description: "Arvenland - Çocuklar için eğlenceli ve eğitici oyunlar dünyası"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.3.0
  provider: ^6.1.5+1
  google_fonts: ^6.2.1

  # App icon generator (optional, run after placing assets/categories/app_icon.png)
  # flutter_launcher_icons: ^0.13.1

  # Uncomment to actually save/share finished drawings:
  # image_gallery_saver: ^2.0.3
  # share_plus: ^9.0.0
  # path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    # Yeni kategori kapak resimleri
    - assets/categories/

    # Mevcut boyama çizimleri
    - assets/coloring/letters/
    - assets/coloring/numbers/
    - assets/coloring/drawings/hayvanlar/
    - assets/coloring/drawings/bocekler/
    - assets/coloring/drawings/doga/
    - assets/coloring/drawings/yiyecekler/
    - assets/coloring/drawings/araclar/
    - assets/coloring/drawings/mevsimler/
    - assets/coloring/drawings/ev_yasam/
    - assets/coloring/drawings/kawaii/
    - assets/coloring/drawings/mandala/
    - assets/coloring/drawings/uzay/
    - assets/coloring/drawings/sekiller/
    - assets/coloring/drawings/manzara/
